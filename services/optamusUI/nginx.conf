server {
    listen 8080;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Handle SvelteKit SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API requests to the Python main-backend
    location /api/ {
        proxy_pass http://main-backend:9000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect http://main-backend:9000/ /;
    }

    # Proxy WebSocket requests
    location /ws/ {
        proxy_pass http://main-backend:9000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Proxy internal Ollama router calls
    location /ollama/ {
        proxy_pass http://main-backend:9000/ollama/;
        proxy_set_header Host $host;
    }
}
