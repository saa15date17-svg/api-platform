# API Platform — Nginx Reverse Proxy
# Runs on the server at 127.0.0.1:8081 (internal), proxied through Cloudflare Tunnel
# Cloudflare Tunnel handles TLS termination, so Nginx only needs HTTP

upstream optamusui {
    server 127.0.0.1:3000;
}

upstream admin_dashboard {
    server 127.0.0.1:3001;
}

upstream main_backend {
    server 127.0.0.1:9000;
}

upstream zitadel {
    server 127.0.0.1:8080;
}

upstream bifrost {
    server 127.0.0.1:8082;
}

# ─── app.optamus.cloud → OptamusUI ───
server {
    listen 127.0.0.1:8081;
    server_name app.optamus.cloud;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://optamusui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ─── admin.optamus.cloud → Admin Dashboard ───
server {
    listen 127.0.0.1:8081;
    server_name admin.optamus.cloud;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://admin_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── api.optamus.cloud → MainBackend + Bifrost ───
server {
    listen 127.0.0.1:8081;
    server_name api.optamus.cloud;

    add_header X-Content-Type-Options "nosniff" always;

    # MainBackend API (admin, management, billing)
    location /api/ {
        proxy_pass http://main_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAI-compatible completions — validated by MainBackend, proxied to Bifrost
    location /v1/ {
        proxy_pass http://main_backend/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # OpenAI-compatible API (models, chat completions, etc.)
    location /openai/ {
        proxy_pass http://main_backend/openai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check
    location /health {
        proxy_pass http://main_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}

# ─── auth.optamus.cloud → Zitadel ───
server {
    listen 127.0.0.1:8081;
    server_name auth.optamus.cloud;

    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://zitadel;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host "auth.optamus.cloud";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
